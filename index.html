<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>selfmade-rocket-fuel</title>
    <style>
      body {
        font-family: sans-serif;
        background-color: #f3f4f6;
        color: #111827;
        margin: 0;
      }
      .container {
        max-width: 800px;
        margin: 0 auto;
        padding: 1rem;
      }
      header {
        background-color: #fff;
        padding: 1.5rem;
        box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06);
      }
      h1 {
        font-size: 1.875rem;
        font-weight: bold;
        text-align: center;
        margin: 0;
      }
      main {
        padding-top: 2rem;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 2rem;
      }
      .panel {
        background-color: #fff;
        padding: 1.5rem;
        border-radius: 0.5rem;
        box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06);
      }
      h2 {
        font-size: 1.5rem;
        font-weight: bold;
        margin-top: 0;
      }
      label {
        display: block;
        margin-bottom: 0.5rem;
        font-weight: 500;
      }
      input,
      select {
        width: 100%;
        padding: 0.5rem;
        border-radius: 0.25rem;
        border: 1px solid #d1d5db;
      }
      .output-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
      }
      .output-item {
        background-color: #f9fafb;
        padding: 1rem;
        border-radius: 0.25rem;
      }
      .output-item .label {
        font-weight: 500;
      }
      .output-item .value {
        font-size: 1.25rem;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="container">
        <h1>Selfmade Rocket Fuel</h1>
      </div>
    </header>
    <main class="container">
      <div class="panel">
        <h2>Input</h2>
        <form id="input-form">
          <div>
            <label for="carbTarget">Carb Target (g/h)</label>
            <input type="number" id="carbTarget" value="90" />
          </div>
          <div>
            <label for="bottleSize">Bottle Size (ml)</label>
            <input type="number" id="bottleSize" value="500" />
          </div>
          <div>
            <label for="carbRatio">Carb Ratio (Glucose:Fructose)</label>
            <select id="carbRatio">
              <option>1:0.8</option>
              <option>2:1</option>
            </select>
          </div>
          <div>
            <label for="syrup">Syrup</label>
            <input type="text" id="syrup" value="Maple Syrup" />
          </div>
          <div>
            <label for="syrupSugar">Syrup Sugar (%)</label>
            <input type="number" id="syrupSugar" value="66" />
          </div>
          <div>
            <label for="syrupAmount">Syrup Amount (g)</label>
            <input type="number" id="syrupAmount" value="50" />
          </div>
          <div>
            <label for="maltodextrin">Use Maltodextrin</label>
            <input type="checkbox" id="maltodextrin" checked />
          </div>
          <div>
            <label for="sugar">Use Sugar</label>
            <input type="checkbox" id="sugar" checked />
          </div>
          <div>
            <label for="sweatRate">Sweat Rate</label>
            <select id="sweatRate">
              <option>medium</option>
              <option>low</option>
              <option>high</option>
            </select>
          </div>
        </form>
      </div>
      <div class="panel">
        <h2>Output</h2>
        <div id="output-panel" class="output-grid">
          <div class="output-item">
            <div class="label">Syrup</div>
            <div class="value" id="output-syrup"></div>
          </div>
          <div class="output-item">
            <div class="label">Maltodextrin</div>
            <div class="value" id="output-maltodextrin"></div>
          </div>
          <div class="output-item">
            <div class="label">Sugar</div>
            <div class="value" id="output-sugar"></div>
          </div>
          <div class="output-item">
            <div class="label">Salt</div>
            <div class="value" id="output-salt"></div>
          </div>
          <div class="output-item">
            <div class="label">Water</div>
            <div class="value" id="output-water"></div>
          </div>
          <div class="output-item">
            <div class="label">Total Carbs</div>
            <div class="value" id="output-totalCarbs"></div>
          </div>
          <div class="output-item">
            <div class="label">Glucose</div>
            <div class="value" id="output-glucose"></div>
          </div>
          <div class="output-item">
            <div class="label">Fructose</div>
            <div class="value" id="output-fructose"></div>
          </div>
          <div class="output-item">
            <div class="label">Ratio</div>
            <div class="value" id="output-ratio"></div>
          </div>
          <div class="output-item">
            <div class="label">Sodium</div>
            <div class="value" id="output-sodium"></div>
          </div>
        </div>
      </div>
    </main>

    <script>
      const calculateRecipe = (input) => {
        const {
          carbTarget,
          bottleSize,
          carbRatio,
          syrupSugar,
          syrupAmount,
          maltodextrin,
          sugar,
          sweatRate,
        } = input;

        let glucoseTarget = 0;
        let fructoseTarget = 0;

        if (carbRatio === '2:1') {
          glucoseTarget = carbTarget * (2 / 3);
          fructoseTarget = carbTarget * (1 / 3);
        } else if (carbRatio === '1:0.8') {
          glucoseTarget = carbTarget * (1 / 1.8);
          fructoseTarget = carbTarget * (0.8 / 1.8);
        } else {
          // Custom ratio logic will be more complex, for now, we'll just split it
          glucoseTarget = carbTarget / 2;
          fructoseTarget = carbTarget / 2;
        }

        // Syrup contribution (assuming 50/50 glucose/fructose)
        const syrupCarbs = (syrupAmount * syrupSugar) / 100;
        const glucoseFromSyrup = syrupCarbs / 2;
        const fructoseFromSyrup = syrupCarbs / 2;

        let glucoseNeeded = glucoseTarget - glucoseFromSyrup;
        let fructoseNeeded = fructoseTarget - fructoseFromSyrup;

        let maltodextrinGrams = 0;
        let sugarGrams = 0;

        if (fructoseNeeded > 0 && sugar) {
          sugarGrams = fructoseNeeded * 2;
          glucoseNeeded -= fructoseNeeded; // account for glucose from sugar
        }

        if (glucoseNeeded > 0 && maltodextrin) {
          maltodextrinGrams = glucoseNeeded;
        }

        // Sodium calculation
        let sodiumTarget = 0;
        if (sweatRate === 'low') {
          sodiumTarget = 400;
        } else if (sweatRate === 'medium') {
          sodiumTarget = 600;
        } else {
          sodiumTarget = 900;
        }
        const sodiumMg = (sodiumTarget * bottleSize) / 1000;
        const saltGrams = sodiumMg / 400;

        const totalCarbs = syrupCarbs + maltodextrinGrams + sugarGrams;
        const totalGlucose = glucoseFromSyrup + maltodextrinGrams + sugarGrams / 2;
        const totalFructose = fructoseFromSyrup + sugarGrams / 2;
        const achievedRatio =
          totalFructose > 0
            ? `1:${(totalGlucose / totalFructose).toFixed(2)}`
            : 'N/A';

        return {
          syrup: syrupAmount,
          maltodextrin: Math.round(maltodextrinGrams),
          sugar: Math.round(sugarGrams),
          salt: Math.round(saltGrams * 10) / 10,
          water: bottleSize > syrupAmount ? bottleSize - syrupAmount : 0,
          totalCarbs: Math.round(totalCarbs),
          glucose: Math.round(totalGlucose),
          fructose: Math.round(totalFructose),
          ratio: achievedRatio,
          sodium: Math.round(sodiumMg),
          sweatLevel: sweatRate,
        };
      };

      const update = () => {
        const input = {
          carbTarget: parseFloat(document.getElementById('carbTarget').value),
          bottleSize: parseFloat(document.getElementById('bottleSize').value),
          carbRatio: document.getElementById('carbRatio').value,
          syrup: document.getElementById('syrup').value,
          syrupSugar: parseFloat(document.getElementById('syrupSugar').value),
          syrupAmount: parseFloat(document.getElementById('syrupAmount').value),
          maltodextrin: document.getElementById('maltodextrin').checked,
          sugar: document.getElementById('sugar').checked,
          sweatRate: document.getElementById('sweatRate').value,
        };
        const recipe = calculateRecipe(input);
        document.getElementById('output-syrup').innerText = recipe.syrup + ' g';
        document.getElementById('output-maltodextrin').innerText = recipe.maltodextrin + ' g';
        document.getElementById('output-sugar').innerText = recipe.sugar + ' g';
        document.getElementById('output-salt').innerText = recipe.salt + ' g';
        document.getElementById('output-water').innerText = recipe.water + ' ml';
        document.getElementById('output-totalCarbs').innerText = recipe.totalCarbs + ' g';
        document.getElementById('output-glucose').innerText = recipe.glucose + ' g';
        document.getElementById('output-fructose').innerText = recipe.fructose + ' g';
        document.getElementById('output-ratio').innerText = recipe.ratio;
        document.getElementById('output-sodium').innerText = recipe.sodium + ' mg';
      };

      document.getElementById('input-form').addEventListener('input', update);
      document.addEventListener('DOMContentLoaded', update);
    </script>
  </body>
</html>
